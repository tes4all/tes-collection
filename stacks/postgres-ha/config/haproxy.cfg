global
    maxconn 256
    log stdout format raw local0 info
    # Graceful shutdown timeout
    hard-stop-after 60s

defaults
    log global
    mode tcp
    retries 3
    timeout client  30m
    timeout connect 4s
    timeout server  30m
    timeout check   5s
    option  dontlognull
    option  tcplog

# Prometheus metrics + HAProxy stats
frontend metrics
    bind *:8405
    mode http
    http-request use-service prometheus-exporter if { path /metrics }
    stats enable
    stats uri /stats
    stats refresh 10s
    no log

# Write endpoint — routes to current Patroni leader only
listen primary
    bind *:5000
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server postgres-1 postgres-1:5432 maxconn 100 check port 8008
    server postgres-2 postgres-2:5432 maxconn 100 check port 8008
    server postgres-3 postgres-3:5432 maxconn 100 check port 8008

# Read endpoint — routes to healthy replicas (round-robin)
listen replicas
    bind *:5001
    balance roundrobin
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server postgres-1 postgres-1:5432 maxconn 100 check port 8008
    server postgres-2 postgres-2:5432 maxconn 100 check port 8008
    server postgres-3 postgres-3:5432 maxconn 100 check port 8008
