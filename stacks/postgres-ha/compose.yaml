
# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║  Postgres HA Golden Stack                                                    ║
# ║  PostgreSQL 18 · Patroni · etcd · HAProxy · pgBackRest                       ║
# ║                                                                              ║
# ║  Network driver is configurable via .env:                                    ║
# ║    NETWORK_DRIVER=bridge   → local Docker Compose                            ║
# ║    NETWORK_DRIVER=overlay  → Docker Swarm (default)                          ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

networks:
  postgres-ha:
    name: postgres-ha
    driver: ${NETWORK_DRIVER:-overlay}
    attachable: true

volumes:
  etcd-1-data:
  etcd-2-data:
  etcd-3-data:
  postgres-1-data:
  postgres-2-data:
  postgres-3-data:
  pgbackrest-data:

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # etcd Cluster (3 nodes) — Distributed consensus for Patroni
  # ═══════════════════════════════════════════════════════════════════════════
  etcd-1:
    image: quay.io/coreos/etcd:v3.6.9

    hostname: etcd-1
    networks:
      - postgres-ha
    environment:
      - ETCD_NAME=etcd-1
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd-1:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd-1:2379
      - ETCD_INITIAL_CLUSTER=etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=postgres-ha-cluster
    volumes:
      - etcd-1-data:/etcd-data
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 30s
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd-2:
    image: quay.io/coreos/etcd:v3.6.9

    hostname: etcd-2
    networks:
      - postgres-ha
    environment:
      - ETCD_NAME=etcd-2
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd-2:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd-2:2379
      - ETCD_INITIAL_CLUSTER=etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=postgres-ha-cluster
    volumes:
      - etcd-2-data:/etcd-data
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 30s
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  etcd-3:
    image: quay.io/coreos/etcd:v3.6.9

    hostname: etcd-3
    networks:
      - postgres-ha
    environment:
      - ETCD_NAME=etcd-3
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd-3:2380
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd-3:2379
      - ETCD_INITIAL_CLUSTER=etcd-1=http://etcd-1:2380,etcd-2=http://etcd-2:2380,etcd-3=http://etcd-3:2380
      - ETCD_INITIAL_CLUSTER_STATE=new
      - ETCD_INITIAL_CLUSTER_TOKEN=postgres-ha-cluster
    volumes:
      - etcd-3-data:/etcd-data
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 30s
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════════════════
  # Patroni PostgreSQL Nodes (3-node cluster)
  # Passwords are injected via environment variables (see .env.example).
  # For Docker Swarm, use Docker Secrets — the entrypoint reads from
  # /run/secrets/ automatically.
  # ═══════════════════════════════════════════════════════════════════════════
  postgres-1:
    build:
      context: .
      dockerfile: Dockerfile.patroni
    image: ${PATRONI_IMAGE:-postgres-ha/patroni:18.1}
    hostname: postgres-1
    networks:
      - postgres-ha
    environment:
      - PATRONI_NAME=postgres-1
      - PATRONI_SCOPE=postgres-cluster
      - HOSTNAME=postgres-1
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - REPLICATOR_PASSWORD=${REPLICATOR_PASSWORD:-replicator}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
    volumes:
      - postgres-1-data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 30s
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: '1'
          memory: 1G
      labels:
        - "prometheus.scrape=true"
        - "prometheus.port=8008"
        - "prometheus.path=/metrics"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      etcd-1:
        condition: service_healthy
      etcd-2:
        condition: service_healthy
      etcd-3:
        condition: service_healthy

  postgres-2:
    build:
      context: .
      dockerfile: Dockerfile.patroni
    image: ${PATRONI_IMAGE:-postgres-ha/patroni:18.1}
    hostname: postgres-2
    networks:
      - postgres-ha
    environment:
      - PATRONI_NAME=postgres-2
      - PATRONI_SCOPE=postgres-cluster
      - HOSTNAME=postgres-2
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - REPLICATOR_PASSWORD=${REPLICATOR_PASSWORD:-replicator}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
    volumes:
      - postgres-2-data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 30s
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: '1'
          memory: 1G
      labels:
        - "prometheus.scrape=true"
        - "prometheus.port=8008"
        - "prometheus.path=/metrics"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      etcd-1:
        condition: service_healthy
      etcd-2:
        condition: service_healthy
      etcd-3:
        condition: service_healthy

  postgres-3:
    build:
      context: .
      dockerfile: Dockerfile.patroni
    image: ${PATRONI_IMAGE:-postgres-ha/patroni:18.1}
    hostname: postgres-3
    networks:
      - postgres-ha
    environment:
      - PATRONI_NAME=postgres-3
      - PATRONI_SCOPE=postgres-cluster
      - HOSTNAME=postgres-3
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - REPLICATOR_PASSWORD=${REPLICATOR_PASSWORD:-replicator}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
    volumes:
      - postgres-3-data:/var/lib/postgresql/data
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 30s
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      resources:
        limits:
          cpus: '1'
          memory: 1G
      labels:
        - "prometheus.scrape=true"
        - "prometheus.port=8008"
        - "prometheus.path=/metrics"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      etcd-1:
        condition: service_healthy
      etcd-2:
        condition: service_healthy
      etcd-3:
        condition: service_healthy

  # ═══════════════════════════════════════════════════════════════════════════
  # HAProxy — Connection Load Balancer
  #   Port 5000 → Primary (read-write)
  #   Port 5001 → Replicas (read-only, round-robin)
  #   Port 8405 → Prometheus metrics + stats UI
  #
  # Other services in the swarm connect to:
  #   dbha:5000  (write)   or   dbha:5001  (read)
  # ═══════════════════════════════════════════════════════════════════════════
  dbha:
    build:
      context: .
      dockerfile: Dockerfile.haproxy
    image: ${HAPROXY_IMAGE:-postgres-ha/haproxy:3.0.7}
    networks:
      - postgres-ha
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      restart_policy:
        condition: on-failure
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
      labels:
        - "prometheus.scrape=true"
        - "prometheus.port=8405"
        - "prometheus.path=/metrics"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - postgres-1
      - postgres-2
      - postgres-3

  # ═══════════════════════════════════════════════════════════════════════════
  # Postgres Exporter — Prometheus metrics for PostgreSQL
  # Connects through HAProxy to always reach the current primary.
  # ═══════════════════════════════════════════════════════════════════════════
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.19.1

    networks:
      - postgres-ha
    environment:
      - DATA_SOURCE_NAME=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@dbha:5000/postgres?sslmode=require
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "prometheus.scrape=true"
        - "prometheus.port=9187"
        - "prometheus.path=/metrics"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9187/metrics"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - dbha

  # ═══════════════════════════════════════════════════════════════════════════
  # pgBackRest — Automated Backups
  # ═══════════════════════════════════════════════════════════════════════════
  pgbackrest:
    build:
      context: .
      dockerfile: Dockerfile.pgbackrest
    image: ${PGBACKREST_IMAGE:-postgres-ha/pgbackrest:18.1}
    networks:
      - postgres-ha
    volumes:
      - pgbackrest-data:/var/lib/pgbackrest
      - postgres-1-data:/var/lib/postgresql/data:ro
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 30s
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - postgres-1
